<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Euro Spring Fling">
  <meta name="theme-color" content="#2a1a0e">
  <title>Euro Spring Fling Translator</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f5f0e8;
      --bg2: #ede7d9;
      --surface: #fffdf8;
      --border: #d5c9b2;
      --text: #2a1a0e;
      --text2: #7a6550;
      --accent: #c96d40;
      --accent-soft: rgba(201,109,64,0.12);
      --tab-bg: #231710;
      --tab-active: #e07845;
      --shadow: rgba(42,26,14,0.1);
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1510;
        --bg2: #241d16;
        --surface: #201912;
        --border: #3a2e22;
        --text: #f0e8d5;
        --text2: #9a856e;
        --accent: #d47848;
        --accent-soft: rgba(212,120,72,0.15);
        --tab-bg: #0f0c08;
        --tab-active: #d47848;
        --shadow: rgba(0,0,0,0.4);
      }
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-top: var(--safe-t);
    }

    /* ── HEADER ── */
    .header {
      background: var(--tab-bg);
      padding: 12px 18px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 22px;
      color: #f0e0c8;
      letter-spacing: 0.02em;
    }
    .logo span { color: var(--tab-active); }
    .offline-pill {
      font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
      background: rgba(255,255,255,0.1);
      color: #f0e0c8;
      padding: 3px 10px; border-radius: 20px;
      display: none;
    }
    .offline-pill.show { display: block; }

    /* ── LANG BAR ── */
    .lang-bar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .lang-btn {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 9px 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px; font-weight: 700;
      color: var(--text);
      cursor: pointer;
      text-align: center;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      touch-action: manipulation;
    }
    .lang-btn:active { opacity: 0.7; }
    .lang-flag { font-size: 18px; }
    .swap-btn {
      background: var(--accent); border: none; border-radius: 50%;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; color: white; cursor: pointer;
      flex-shrink: 0; touch-action: manipulation;
      transition: transform 0.2s;
    }
    .swap-btn:active { transform: scale(0.88) rotate(180deg); }

    /* ── TABS ── */
    .content-area { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .tab-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .tab-panel.active { display: flex; }

    /* ── TRANSLATE TAB ── */
    .translate-wrap {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain; padding: 14px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px; overflow: hidden;
    }
    .card-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text2); padding: 10px 14px 0;
    }
    textarea.input-text {
      width: 100%; min-height: 90px;
      padding: 8px 14px 10px;
      background: transparent; border: none; outline: none;
      font-family: 'Nunito', sans-serif; font-size: 17px;
      color: var(--text); resize: none; line-height: 1.5;
    }
    textarea.input-text::placeholder { color: var(--text2); opacity: 0.55; }
    .card-footer {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 10px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
    }
    .icon-btn {
      background: none; border: none; padding: 7px;
      cursor: pointer; color: var(--text2); font-size: 17px;
      border-radius: 8px; touch-action: manipulation;
    }
    .icon-btn:active { background: var(--border); }
    .spacer { flex: 1; }
    .translate-btn {
      background: var(--accent); color: white; border: none;
      border-radius: 9px; padding: 8px 20px;
      font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; touch-action: manipulation;
    }
    .translate-btn:active { opacity: 0.82; }

    .output-text {
      padding: 8px 14px 14px; font-size: 20px;
      font-family: 'Playfair Display', serif;
      line-height: 1.55; color: var(--text);
      min-height: 68px;
    }
    .output-placeholder { color: var(--text2); opacity: 0.45; font-style: italic; font-size: 16px; }
    .match-note { font-size: 12px; color: var(--text2); font-style: italic; padding: 0 14px 8px; }
    .output-actions { display: flex; gap: 6px; }
    .act-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 12px;
      font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 600;
      color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 5px;
      touch-action: manipulation;
    }
    .act-btn:active { background: var(--bg2); }
    .act-btn.active-fav { color: var(--accent); border-color: var(--accent); }

    /* Loading dots */
    .dots { display: none; gap: 5px; padding: 14px; align-items: center; }
    .dots.show { display: flex; }
    .dot {
      width: 8px; height: 8px; background: var(--accent); border-radius: 50%;
      animation: dotbounce 1s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes dotbounce {
      0%,80%,100% { transform: translateY(0); }
      40% { transform: translateY(-7px); }
    }

    /* ── PHRASEBOOK TAB ── */
    .cat-bar {
      display: flex; gap: 8px;
      padding: 12px 14px; overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .cat-bar::-webkit-scrollbar { display: none; }
    .cat-pill {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 20px; padding: 6px 14px;
      font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 600;
      color: var(--text2); cursor: pointer; white-space: nowrap;
      flex-shrink: 0; touch-action: manipulation;
    }
    .cat-pill.on { background: var(--accent); border-color: var(--accent); color: white; }
    .phrase-list {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain; padding: 10px 14px 14px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .phrase-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 12px; cursor: pointer;
    }
    .phrase-top {
      padding: 12px 12px 12px 14px;
      display: flex; align-items: flex-start; gap: 8px;
    }
    .phrase-top-text { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .phrase-en { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.4; word-wrap: break-word; }
    .phrase-tgt {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: 14px; color: var(--accent); line-height: 1.4; word-wrap: break-word;
    }
    .chevron { color: var(--text2); font-size: 13px; transition: transform 0.2s; flex-shrink: 0; margin-top: 2px; padding: 4px; }
    .phrase-card.open .chevron { transform: rotate(180deg); }
    .phrase-detail {
      display: none; border-top: 1px solid var(--border);
      background: var(--bg2); padding: 4px 14px 12px;
      border-radius: 0 0 12px 12px;
    }
    .phrase-card.open .phrase-detail { display: block; }
    .lang-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 9px 0; border-bottom: 1px solid var(--border);
    }
    .lang-row:last-child { border-bottom: none; }
    .lc {
      font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--text2); min-width: 26px;
      padding-top: 2px; flex-shrink: 0;
    }
    .lp { font-size: 15px; color: var(--text); flex: 1; line-height: 1.5; word-wrap: break-word; }
    .p-star {
      background: none; border: none; font-size: 20px; cursor: pointer;
      padding: 0 0 0 8px; color: var(--text2); touch-action: manipulation;
      flex-shrink: 0; line-height: 1.5;
    }
    .p-star.on { color: var(--accent); }

    /* ── FAVORITES TAB ── */
    .fav-wrap {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain; padding: 14px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .empty {
      text-align: center; padding: 60px 30px; color: var(--text2);
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.6; }
    .empty h3 { font-family: 'Playfair Display', serif; font-size: 18px; margin-bottom: 8px; color: var(--text); }
    .empty p { font-size: 14px; line-height: 1.7; }
    .fav-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 12px 14px;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .fav-content { flex: 1; }
    .fav-en { font-size: 14px; color: var(--text2); margin-bottom: 4px; }
    .fav-translated { font-family: 'Playfair Display', serif; font-style: italic; font-size: 17px; color: var(--text); }
    .fav-meta { font-size: 11px; color: var(--text2); margin-top: 4px; }
    .fav-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
    .fav-copy-btn, .fav-del-btn {
      background: none; border: none; font-size: 17px; cursor: pointer; padding: 3px;
      touch-action: manipulation;
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      background: var(--tab-bg); display: flex;
      padding-bottom: var(--safe-b);
      border-top: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 10px 0 8px; cursor: pointer; background: none; border: none;
      color: rgba(255,255,255,0.38); font-family: 'Nunito', sans-serif;
      touch-action: manipulation;
    }
    .nav-btn.on { color: var(--tab-active); }
    .nav-icon { font-size: 20px; }
    .nav-lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.04em; }

    /* ── MODALS ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(2px);
      z-index: 100; display: none; align-items: flex-end; justify-content: center;
    }
    .overlay.show { display: flex; }
    .sheet {
      background: var(--surface); border-radius: 20px 20px 0 0;
      width: 100%; max-width: 500px;
      padding-bottom: calc(16px + var(--safe-b));
    }
    .sheet-handle {
      width: 36px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 12px auto 0;
    }
    .sheet-title {
      font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700;
      text-align: center; padding: 14px 20px 14px;
      border-bottom: 1px solid var(--border); color: var(--text);
    }
    .pick-opt {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 22px; border-bottom: 1px solid var(--border);
      cursor: pointer; touch-action: manipulation;
    }
    .pick-opt:last-child { border-bottom: none; }
    .pick-opt:active { background: var(--bg2); }
    .pick-flag { font-size: 26px; }
    .pick-info { flex: 1; }
    .pick-name { font-size: 16px; font-weight: 700; color: var(--text); }
    .pick-sub { font-size: 13px; color: var(--text2); }
    .pick-check { font-size: 18px; color: var(--accent); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: calc(80px + var(--safe-b));
      left: 50%; transform: translateX(-50%) translateY(12px);
      background: var(--tab-bg); color: #f0e0c8;
      padding: 10px 20px; border-radius: 22px;
      font-size: 13px; font-weight: 700;
      opacity: 0; transition: all 0.22s;
      pointer-events: none; z-index: 300; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── DICTIONARY TAB ── */
    .dict-search-wrap {
      padding: 12px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .dict-search-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 0 12px;
    }
    .dict-search-row:focus-within { border-color: var(--accent); }
    .dict-search-icon { font-size: 16px; color: var(--text2); flex-shrink: 0; }
    .dict-input {
      flex: 1; background: none; border: none; outline: none;
      font-family: 'Nunito', sans-serif; font-size: 16px;
      color: var(--text); padding: 11px 0;
    }
    .dict-input::placeholder { color: var(--text2); opacity: 0.55; }
    .dict-clear {
      background: none; border: none; font-size: 16px; color: var(--text2);
      cursor: pointer; padding: 4px; touch-action: manipulation;
    }
    .dict-filter-row {
      display: flex; gap: 6px; margin-top: 9px; overflow-x: auto;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .dict-filter-row::-webkit-scrollbar { display: none; }
    .dict-pill {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 20px; padding: 4px 12px;
      font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 600;
      color: var(--text2); cursor: pointer; white-space: nowrap;
      flex-shrink: 0; touch-action: manipulation;
    }
    .dict-pill.on { background: var(--accent); border-color: var(--accent); color: white; }
    .dict-list {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain; padding: 8px 14px 14px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .dict-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 4px 10px; align-items: start;
    }
    .dict-en { font-size: 14px; font-weight: 700; color: var(--text); }
    .dict-fr {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: 14px; color: var(--accent);
    }
    .dict-de {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: 14px; color: #6a8fb0;
    }
    .dict-pos {
      font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase; color: var(--text2); grid-column: 1 / -1;
      margin-bottom: 1px;
    }
    .dict-header {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 0 10px; padding: 6px 14px 2px;
      flex-shrink: 0;
    }
    .dict-header span {
      font-size: 10px; font-weight: 800; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text2);
    }
    .dict-empty {
      text-align: center; padding: 40px 20px; color: var(--text2);
      font-size: 14px; font-style: italic;
    }
    .dict-count {
      font-size: 11px; color: var(--text2); padding: 4px 14px 6px;
      flex-shrink: 0;
    }

    /* ── ERROR ── */
    .error-msg {
      font-size: 14px; color: #c04040; font-style: italic;
      padding: 8px 14px 10px;
    }
    /* ── DESKTOP RESPONSIVE ── */
    @media (min-width: 600px) {
      body { align-items: center; background: var(--bg2); }
      body > * { width: 100%; max-width: 480px; }
      .header { border-radius: 16px 16px 0 0; }
      .bottom-nav { border-radius: 0 0 16px 16px; }
      body {
        padding-top: 24px;
        padding-bottom: 24px;
      }
      .content-area { flex: 1; }
    }

  </style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="logo">Euro Spring <span>Fling</span></div>
  <div class="offline-pill" id="offlinePill">✈ Offline Mode</div>
</header>

<!-- Language Bar -->
<div class="lang-bar">
  <button class="lang-btn" id="fromBtn" onclick="openPicker('from')">
    <span class="lang-flag" id="fromFlag">🇺🇸</span>
    <span id="fromName">English</span>
  </button>
  <button class="swap-btn" onclick="swapLangs()">⇄</button>
  <button class="lang-btn" id="toBtn" onclick="openPicker('to')">
    <span class="lang-flag" id="toFlag">🇫🇷</span>
    <span id="toName">Français</span>
  </button>
</div>

<!-- Main Content -->
<div class="content-area">

  <!-- TRANSLATE -->
  <div class="tab-panel active" id="panel-translate">
    <div class="translate-wrap">
      <div class="card">
        <div class="card-label" id="inputLbl">English</div>
        <textarea class="input-text" id="inputText" placeholder="Type something to translate…" rows="4" oninput="scheduleTranslate()"></textarea>
        <div class="card-footer">
          <button class="icon-btn" onclick="clearAll()" title="Clear">✕</button>
          <button class="icon-btn" onclick="startVoice()" id="micBtn" title="Voice input">🎙</button>
          <span class="spacer"></span>
          <button class="translate-btn" onclick="doTranslate()">Translate →</button>
        </div>
      </div>

      <div class="card">
        <div class="card-label" id="outputLbl">Français</div>
        <div class="dots" id="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="output-text" id="outputText"><span class="output-placeholder">Translation appears here</span></div>
        <div class="match-note" id="matchNote" style="display:none"></div>
        <div class="error-msg" id="errorMsg" style="display:none"></div>
        <div class="card-footer">
          <div class="output-actions">
            <button class="act-btn" id="copyBtn" onclick="copyOutput()">📋 Copy</button>
            <button class="act-btn" id="savBtn" onclick="saveToFavs()">☆ Save</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- PHRASEBOOK -->
  <div class="tab-panel" id="panel-phrasebook">
    <div class="cat-bar" id="catBar"></div>
    <div class="phrase-list" id="phraseList"></div>
  </div>

  <!-- FAVORITES -->
  <div class="tab-panel" id="panel-favorites">
    <div class="fav-wrap" id="favList"></div>
  </div>

  <!-- DICTIONARY -->
  <div class="tab-panel" id="panel-dictionary">
    <div class="dict-search-wrap">
      <div class="dict-search-row">
        <span class="dict-search-icon">🔍</span>
        <input class="dict-input" id="dictInput" type="search" placeholder="Search in English, French or German…" oninput="renderDict()" autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="dict-clear" onclick="clearDictSearch()" id="dictClearBtn" style="display:none">✕</button>
      </div>
      <div class="dict-filter-row" id="dictFilterRow"></div>
    </div>
    <div class="dict-header">
      <span>🇺🇸 English</span>
      <span>🇫🇷 Français</span>
      <span>🇦🇹 Deutsch</span>
    </div>
    <div class="dict-count" id="dictCount"></div>
    <div class="dict-list" id="dictList"></div>
  </div>

</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-btn on" id="nav-translate" onclick="switchTab('translate')">
    <span class="nav-icon">💬</span><span class="nav-lbl">Translate</span>
  </button>
  <button class="nav-btn" id="nav-phrasebook" onclick="switchTab('phrasebook')">
    <span class="nav-icon">📖</span><span class="nav-lbl">Phrasebook</span>
  </button>
  <button class="nav-btn" id="nav-dictionary" onclick="switchTab('dictionary')">
    <span class="nav-icon">📚</span><span class="nav-lbl">Dictionary</span>
  </button>
  <button class="nav-btn" id="nav-favorites" onclick="switchTab('favorites')">
    <span class="nav-icon">⭐</span><span class="nav-lbl">Favorites</span>
  </button>
</nav>

<!-- Language Picker Modal -->
<div class="overlay" id="pickerOverlay" onclick="maybeCloseOverlay(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="pickerTitle">Select Language</div>
    <div id="pickerOptions"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>

// ═══════════════════════════════════════════
// LANGUAGE MANAGEMENT
// ═══════════════════════════════════════════
function updateLangBar() {
  document.getElementById('fromFlag').textContent = LANGS[fromLang].flag;
  document.getElementById('fromName').textContent = LANGS[fromLang].name;
  document.getElementById('toFlag').textContent   = LANGS[toLang].flag;
  document.getElementById('toName').textContent   = LANGS[toLang].name;
  document.getElementById('inputLbl').textContent  = LANGS[fromLang].name;
  document.getElementById('outputLbl').textContent = LANGS[toLang].name;
}

function swapLangs() {
  [fromLang, toLang] = [toLang, fromLang];
  const inputEl = document.getElementById('inputText');
  const outputEl = document.getElementById('outputText');
  // Swap text content if there's a real translation
  if (currentOutput && !outputEl.querySelector('.output-placeholder')) {
    inputEl.value = currentOutput;
    currentInput = currentOutput;
  }
  updateLangBar();
  renderPhrases();
  clearOutput();
  if (inputEl.value.trim()) scheduleTranslate();
}

function openPicker(target) {
  pickerTarget = target;
  const currentSel = target === 'from' ? fromLang : toLang;
  const other = target === 'from' ? toLang : fromLang;
  document.getElementById('pickerTitle').textContent = target === 'from' ? 'Translate from' : 'Translate to';
  const container = document.getElementById('pickerOptions');
  container.innerHTML = '';
  Object.entries(LANGS).forEach(([code, info]) => {
    if (code === other) return; // can't pick same lang for both
    const div = document.createElement('div');
    div.className = 'pick-opt';
    div.innerHTML = `<span class="pick-flag">${info.flag}</span>
      <div class="pick-info">
        <div class="pick-name">${info.name}</div>
        <div class="pick-sub">${info.note}</div>
      </div>
      ${code === currentSel ? '<span class="pick-check">✓</span>' : ''}`;
    div.onclick = () => selectLang(code);
    container.appendChild(div);
  });
  document.getElementById('pickerOverlay').classList.add('show');
}

function selectLang(code) {
  if (pickerTarget === 'from') {
    if (code === toLang) toLang = fromLang; // swap to avoid conflict
    fromLang = code;
  } else {
    if (code === fromLang) fromLang = toLang;
    toLang = code;
  }
  updateLangBar();
  renderPhrases();
  clearOutput();
  closePicker();
  const inputEl = document.getElementById('inputText');
  if (inputEl.value.trim()) scheduleTranslate();
}

function closePicker() {
  document.getElementById('pickerOverlay').classList.remove('show');
}

function maybeCloseOverlay(e) {
  if (e.target === document.getElementById('pickerOverlay')) closePicker();
}

// ═══════════════════════════════════════════
// TRANSLATION
// ═══════════════════════════════════════════
function scheduleTranslate() {
  clearTimeout(translateTimer);
  const val = document.getElementById('inputText').value.trim();
  if (!val) { clearOutput(); return; }
  translateTimer = setTimeout(() => doTranslate(), 900);
}

async function doTranslate() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) return;
  currentInput = text;

  showLoading(true);
  hideOutput();
  document.getElementById('matchNote').style.display = 'none';
  document.getElementById('errorMsg').style.display = 'none';

  if (!isOnline) {
    offlineTranslate(text);
    return;
  }

  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${fromLang}|${toLang}`;
    const res = await fetch(url);
    const data = await res.json();

    if (data.responseStatus === 200 || data.responseStatus === '200') {
      let translated = data.responseData.translatedText;
      // MyMemory sometimes returns "MYMEMORY WARNING" for quota
      if (translated && !translated.includes('MYMEMORY WARNING')) {
        showOutput(translated);
      } else {
        offlineTranslate(text);
      }
    } else {
      offlineTranslate(text);
    }
  } catch (e) {
    offlineTranslate(text);
  }
}

function offlineTranslate(text) {
  const result = fuzzyMatch(text, fromLang, toLang);
  if (result) {
    showOutput(result.phrase[toLang]);
    const confPct = Math.round(result.score * 100);
    const note = document.getElementById('matchNote');
    note.textContent = `✈ Offline — closest phrasebook match (${confPct}% match)`;
    note.style.display = 'block';
  } else {
    showLoading(false);
    const err = document.getElementById('errorMsg');
    err.textContent = '✈ Offline — no close phrasebook match found. Try browsing the Phrasebook tab.';
    err.style.display = 'block';
    document.getElementById('outputText').innerHTML = '<span class="output-placeholder">No match found offline</span>';
    document.getElementById('outputText').style.display = 'block';
    currentOutput = '';
  }
}

// Simple but effective fuzzy match
function fuzzyMatch(query, from, to) {
  const qNorm = norm(query);
  const qWords = qNorm.split(/\s+/).filter(w => w.length > 2);

  let best = null, bestScore = 0;

  for (const p of PHRASEBOOK) {
    if (!p[from] || !p[to]) continue;
    const pNorm = norm(p[from]);
    const pWords = pNorm.split(/\s+/).filter(w => w.length > 2);

    // Exact match
    if (qNorm === pNorm) return { phrase: p, score: 1 };

    // Word overlap score
    let matches = 0;
    for (const qw of qWords) {
      if (pWords.some(pw => pw.includes(qw) || qw.includes(pw))) matches++;
    }
    const total = Math.max(qWords.length, pWords.length, 1);
    const score = matches / total;

    // Substring bonus
    const subBonus = pNorm.includes(qNorm) || qNorm.includes(pNorm) ? 0.3 : 0;
    const finalScore = Math.min(score + subBonus, 1);

    if (finalScore > bestScore) {
      bestScore = finalScore;
      best = p;
    }
  }

  return bestScore >= 0.25 ? { phrase: best, score: bestScore } : null;
}

function norm(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9\s]/g, ' ')
    .replace(/\s+/g, ' ').trim();
}

function showLoading(show) {
  document.getElementById('dots').classList.toggle('show', show);
}

function showOutput(text) {
  showLoading(false);
  currentOutput = text;
  const el = document.getElementById('outputText');
  el.textContent = text;
  el.style.display = 'block';
  document.getElementById('savBtn').classList.remove('active-fav');
}

function hideOutput() {
  document.getElementById('outputText').style.display = 'none';
}

function clearOutput() {
  showLoading(false);
  currentOutput = '';
  document.getElementById('outputText').innerHTML = '<span class="output-placeholder">Translation appears here</span>';
  document.getElementById('outputText').style.display = 'block';
  document.getElementById('matchNote').style.display = 'none';
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('savBtn').classList.remove('active-fav');
}

function clearAll() {
  document.getElementById('inputText').value = '';
  clearTimeout(translateTimer);
  clearOutput();
}

// ═══════════════════════════════════════════
// COPY & FAVORITES
// ═══════════════════════════════════════════
function copyOutput() {
  if (!currentOutput) return;
  navigator.clipboard.writeText(currentOutput).then(() => showToast('Copied!')).catch(() => showToast('Copied!'));
}

function saveToFavs() {
  if (!currentOutput || !currentInput) return;
  const fav = {
    id: Date.now(),
    en: currentInput,
    translated: currentOutput,
    from: fromLang,
    to: toLang,
    fromFlag: LANGS[fromLang].flag,
    toFlag: LANGS[toLang].flag,
  };
  // Avoid duplicates
  if (favorites.some(f => f.translated === currentOutput)) {
    showToast('Already saved!');
    return;
  }
  favorites.unshift(fav);
  localStorage.setItem('favs', JSON.stringify(favorites));
  renderFavorites();
  document.getElementById('savBtn').classList.add('active-fav');
  showToast('Saved to favorites ⭐');
}

function deleteFav(id) {
  favorites = favorites.filter(f => f.id !== id);
  localStorage.setItem('favs', JSON.stringify(favorites));
  renderFavorites();
}

function copyFav(text) {
  navigator.clipboard.writeText(text).then(() => showToast('Copied!')).catch(() => {});
}

function renderFavorites() {
  const container = document.getElementById('favList');
  if (favorites.length === 0) {
    container.innerHTML = `<div class="empty">
      <div class="empty-icon">⭐</div>
      <h3>No saved phrases yet</h3>
      <p>Tap the Save button after translating, or star phrases in the Phrasebook.</p>
    </div>`;
    return;
  }
  container.innerHTML = favorites.map(f => `
    <div class="fav-card">
      <div class="fav-content">
        <div class="fav-en">${escHtml(f.en)}</div>
        <div class="fav-translated">${escHtml(f.translated)}</div>
        <div class="fav-meta">${f.fromFlag} ${LANGS[f.from]?.name || f.from} → ${f.toFlag} ${LANGS[f.to]?.name || f.to}</div>
      </div>
      <div class="fav-actions">
        <button class="fav-copy-btn" onclick="copyFav('${escAttr(f.translated)}')" title="Copy">📋</button>
        <button class="fav-del-btn" onclick="deleteFav(${f.id})" title="Remove">🗑</button>
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════
// PHRASEBOOK
// ═══════════════════════════════════════════
function buildCatBar() {
  const bar = document.getElementById('catBar');
  bar.innerHTML = CATEGORIES.map(c =>
    `<button class="cat-pill ${c.id === activeCat ? 'on' : ''}" onclick="setCat('${c.id}')">${c.emoji} ${c.label}</button>`
  ).join('');
}

function setCat(id) {
  activeCat = id;
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.cat-pill').forEach(p => {
    if (p.textContent.trim().includes(CATEGORIES.find(c=>c.id===id)?.label)) p.classList.add('on');
  });
  renderPhrases();
}

function renderPhrases() {
  const phrases = activeCat === 'all' ? PHRASEBOOK : PHRASEBOOK.filter(p => p.cat === activeCat);

  // Determine display from/to for phrasebook
  const displayFrom = fromLang;
  const displayTo   = toLang;

  document.getElementById('phraseList').innerHTML = phrases.map((p, i) => {
    const id = `p${i}`;
    const isStarred = phraseStars[p.en + p.cat];
    return `<div class="phrase-card" id="${id}">
      <div class="phrase-top" onclick="togglePhrase('${id}')">
        <div class="phrase-top-text">
          <div class="phrase-en">${escHtml(p[displayFrom] || p.en)}</div>
          <div class="phrase-tgt">${escHtml(p[displayTo] || p.fr)}</div>
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="phrase-detail">
        <div class="lang-row">
          <span class="lc">EN</span>
          <span class="lp">${escHtml(p.en)}</span>
        </div>
        <div class="lang-row">
          <span class="lc">FR</span>
          <span class="lp">${escHtml(p.fr)}</span>
        </div>
        <div class="lang-row">
          <span class="lc">DE</span>
          <span class="lp">${escHtml(p.de)}</span>
          <button class="p-star ${isStarred ? 'on' : ''}" onclick="togglePhraStar(event,'${escAttr(p.en)}','${escAttr(p.cat)}','${escAttr(p.fr)}','${escAttr(p.de)}')">${isStarred ? '★' : '☆'}</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function togglePhrase(id) {
  document.getElementById(id).classList.toggle('open');
}

function togglePhraStar(event, en, cat, fr, de) {
  event.stopPropagation();
  const key = en + cat;
  if (phraseStars[key]) {
    delete phraseStars[key];
    favorites = favorites.filter(f => f.en !== en || f.from !== 'phrase');
    showToast('Removed from favorites');
  } else {
    phraseStars[key] = true;
    const fav = { id: Date.now(), en: en, translated: toLang === 'fr' ? fr : de, from: 'phrase', to: toLang, fromFlag: '📖', toFlag: LANGS[toLang].flag };
    if (!favorites.some(f => f.en === en && f.translated === fav.translated)) {
      favorites.unshift(fav);
    }
    showToast('Saved to favorites ⭐');
  }
  localStorage.setItem('stars', JSON.stringify(phraseStars));
  localStorage.setItem('favs', JSON.stringify(favorites));
  renderPhrases();
  renderFavorites();
}

// ═══════════════════════════════════════════
// VOICE INPUT
// ═══════════════════════════════════════════
function startVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Voice not supported on this browser'); return; }
  const r = new SR();
  r.lang = fromLang === 'en' ? 'en-US' : fromLang === 'fr' ? 'fr-FR' : 'de-AT';
  r.interimResults = false;
  r.maxAlternatives = 1;
  const micBtn = document.getElementById('micBtn');
  micBtn.textContent = '🔴';
  r.onresult = e => {
    document.getElementById('inputText').value = e.results[0][0].transcript;
    micBtn.textContent = '🎙';
    scheduleTranslate();
  };
  r.onerror = () => { micBtn.textContent = '🎙'; showToast('Could not hear — try again'); };
  r.onend = () => { micBtn.textContent = '🎙'; };
  r.start();
}

// ═══════════════════════════════════════════
// TAB NAVIGATION
// ═══════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
  document.getElementById(`panel-${tab}`).classList.add('active');
  document.getElementById(`nav-${tab}`).classList.add('on');
  if (tab === 'favorites') renderFavorites();
  if (tab === 'dictionary') renderDict();
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

const DICT_CATS = [
  {id:'all',label:'All'},
  {id:'food',label:'🍽 Food & Drink'},
  {id:'travel',label:'🚆 Travel'},
  {id:'accommodation',label:'🏨 Hotels'},
  {id:'shopping',label:'🛍 Shopping'},
  {id:'ski',label:'⛷️ Ski'},
  {id:'health',label:'🚑 Health'},
  {id:'places',label:'📍 Places'},
  {id:'people',label:'🧑 People & Body'},
  {id:'adjectives',label:'💬 Adjectives'},
  {id:'verbs',label:'⚡ Verbs'},
  {id:'weather',label:'🌤 Weather'},
];

let dictCat = 'all';

function initDict() {
  const row = document.getElementById('dictFilterRow');
  row.innerHTML = DICT_CATS.map(c =>
    `<button class="dict-pill ${c.id === dictCat ? 'on' : ''}" onclick="setDictCat('${c.id}')">${c.label}</button>`
  ).join('');
  renderDict();
}

function setDictCat(id) {
  dictCat = id;
  document.querySelectorAll('.dict-pill').forEach(p => p.classList.remove('on'));
  event.target.classList.add('on');
  renderDict();
}

function clearDictSearch() {
  document.getElementById('dictInput').value = '';
  document.getElementById('dictClearBtn').style.display = 'none';
  renderDict();
}

function renderDict() {
  const q = (document.getElementById('dictInput').value || '').toLowerCase().trim();
  document.getElementById('dictClearBtn').style.display = q ? 'block' : 'none';

  let results = DICT;
  if (dictCat !== 'all') results = results.filter(w => w.cat === dictCat);
  if (q) {
    results = results.filter(w =>
      w.en.toLowerCase().includes(q) ||
      w.fr.toLowerCase().includes(q) ||
      w.de.toLowerCase().includes(q)
    );
  }

  const countEl = document.getElementById('dictCount');
  countEl.textContent = q || dictCat !== 'all'
    ? `${results.length} word${results.length !== 1 ? 's' : ''} found`
    : `${DICT.length} words — search or filter above`;

  const list = document.getElementById('dictList');
  if (results.length === 0) {
    list.innerHTML = `<div class="dict-empty">No words matched "${escHtml(q)}"</div>`;
    return;
  }

  list.innerHTML = results.map(w => `
    <div class="dict-card">
      <div class="dict-en">${escHtml(highlight(w.en, q))}</div>
      <div class="dict-fr">${escHtml(highlight(w.fr, q))}</div>
      <div class="dict-de">${escHtml(highlight(w.de, q))}</div>
    </div>
  `).join('');
}

function highlight(text, q) {
  // Just return text — HTML escaping handles safety, no raw HTML injection needed
  return text;
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return (s||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}
